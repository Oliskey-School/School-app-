<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/app-icon-180.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart School Management App</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Theme colors for mobile browsers -->
  <meta name="theme-color" content="#4F46E5" />
  <meta name="msapplication-TileColor" content="#4F46E5" />

  <!-- iOS PWA Support -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SchoolApp" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />

  <!-- Description for SEO and PWA -->
  <meta name="description"
    content="Complete school management system for students, teachers, parents and administrators. Works offline!" />

  <!-- Force light mode to prevent dark mode color issues -->
  <script>document.documentElement.classList.remove('dark');</script>
  <meta name="color-scheme" content="light only">
  <style>
    :root {
      color-scheme: light only;
    }
  </style>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="bg-gray-100">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
