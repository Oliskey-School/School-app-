worker_processes auto;
worker_rlimit_nofile 1000000; # extremely high limit for massive connections

events {
    worker_connections 65535; # Handle max possible connections per worker
    multi_accept on;
    use epoll; # optimal for Linux
}

http {
    # --------------------------------------------------------
    # Optimization for Massive Scale (1M+ concurrent per node)
    # --------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100000;
    types_hash_max_size 2048;

    # Buffer optimizations
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    output_buffers 1 32k;
    postpone_output 1460;

    # Gzip Compression to save bandwidth
    gzip on;
    gzip_min_length 1000;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    # --------------------------------------------------------
    # Application Upstream Cluster
    # --------------------------------------------------------
    upstream backend_cluster {
        # Using least_conn to distribute to the least busy node.
        # This prevents lagging if one process is blocked on a heavy task.
        least_conn;
        
        # In a real 200 Billion users/sec scenario, these would be 
        # hundreds of thousands of external IP addresses (e.g., AWS EC2 instances).
        # For local massive scaling, we bind to local PM2/Cluster processes:
        server 127.0.0.1:5001 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:5002 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:5003 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:5004 max_fails=3 fail_timeout=30s;
        
        # Enable connection keepalive to upstream
        keepalive 1024;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name api.schoolapp.com;

        # Protect against DDoS and limit bursts
        limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10000r/s;

        location / {
            limit_req zone=mylimit burst=20000 nodelay;

            proxy_pass http://backend_cluster;
            proxy_http_version 1.1;
            
            # WebSocket and Keep-Alive headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            
            # Pass real client IPs
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_addrs;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for failing fast (prevents cascading failures)
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            # Caching to drastically reduce load on Node.js processes
            proxy_cache_bypass $http_upgrade;
        }
    }
}
